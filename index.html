<!DOCTYPE html>
<html>
<head>
  <title>robone</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }

    h1 {
      width: 100%;
      font-size: 100px;
      margin-top: 40px;
      font-family: Courier, Courier, sans-serif;
    }

    h2 {
      width: 30%;
      font-size: 40px;
      margin: -20px auto 40px auto;
      font-family: Lexend, serif;
    }

    .game-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    .game-card {
      width: 30%;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      text-align: left;
      background-color: #f9f9f9;
    }

    .game-card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .game-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .game-desc {
      font-size: 16px;
      color: #555;
    }

  </style>

</head>

<body>

  <h1>robone Games</h1>
  <h2>this is my cool site with games 🎮</h2>

  <div class="game-row">
    <div class="game-card">
      <img src="https://i.imgur.com/example.png" alt="game 1">
      <div class="game-title">Game 1</div>
      <div class="game-desc">not done.</div>
    </div>

    <div class="game-card">
      <img src="https://i.imgur.com/example.png" alt="game 2">
      <div class="game-title">Game 2</div>
      <div class="game-desc">not done.</div>
    </div>

    <div class="game-card">
      <img src="https://i.imgur.com/example.png" alt="game 3">
      <div class="game-title">Game 3</div>
      <div class="game-desc">not done.</div>
    </div>
  </div>

</body>
</html>
