<!DOCTYPE html>
<html>
<head>
  <title>robone</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
    }

    h1 {
      width: 100%;
      font-size: 100px;
      margin-top: 40px;
      font-family: Courier, Courier, sans-serif;
    }

    h2 {
      width: 30%;
      font-size: 40px;
      margin: -20px auto 40px auto; /* moves it up a bit, keeps bottom spacing */
      font-family: Lexend, serif;
    }

    .game-row {
      display: flex;
      justify-content: center; /* centers the whole row */
      gap: 20px; /* space between images */
      margin-bottom: 40px;
    }

    .game-row img {
      width: 30%; /* each image takes about 1/3 of the row */
    }

  </style>

</head>

<body>

  <h1>robone Games</h1>
  <h2>this is my cool site with games 🎮</h2>

  <div class="game-row">
    <img src="https://i.imgur.com/example.png" alt="game 1">
    <img src="https://i.imgur.com/example.png" alt="game 2">
    <img src="https://i.imgur.com/example.png" alt="game 3">
  </div>

</body>
</html>
